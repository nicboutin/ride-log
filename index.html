<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ride Log</title>
<meta name="description" content="A personal cycling dashboard, connected to Strava." />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <div class="topbar">
      <div class="mark">RIDE<span>LOG</span></div>
      <div id="topbarStatus" class="status-pill">
        <span class="status-dot off"></span> not connected
      </div>
    </div>
    <div id="main"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
